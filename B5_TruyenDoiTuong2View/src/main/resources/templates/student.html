<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thông tin Sinh Viên</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f9f9f9; padding: 50px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        h2 { color: #333; text-align: center; }
        .info { font-size: 18px; line-height: 1.6; color: #555; }
        .highlight { color: #d9534f; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Hồ Sơ Sinh Viên</h2>
        
        <div class="info">
            <p><strong>Mã SV:</strong> <span th:text="${sv.studentId}"></span></p>
            <p><strong>Họ và tên:</strong> <span th:text="${sv.fullName}"></span></p>
            <p><strong>Điểm GPA:</strong> <span th:text="${sv.gpa}" class="highlight"></span></p>
        </div>
        
        <p th:if="${sv.gpa >= 8.0}" style="color: green; font-weight: bold; text-align: center;">
            Học lực: Giỏi
        </p>
    </div>

</body>
</html>
