<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tính Chỉ Số BMI</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
    <div class="container">
        <h1>Tính Chỉ Số BMI</h1>
        
        <form th:action="@{/calculate}" method="post">
            <div class="form-group">
                <label for="height">Chiều cao (cm):</label>
                <input type="number" step="any" id="height" name="height" th:value="${height}" placeholder="Ví dụ: 170" required>
            </div>
            <div class="form-group">
                <label for="weight">Cân nặng (kg):</label>
                <input type="number" step="any" id="weight" name="weight" th:value="${weight}" placeholder="Ví dụ: 65" required>
            </div>
            <button type="submit">Kiểm Tra</button>
        </form>

        <div th:if="${error != null}" class="alert error">
            <p th:text="${error}"></p>
        </div>

        <div th:if="${bmi != null}" class="result">
            <h2>Kết quả của bạn</h2>
            <p>Chỉ số BMI: <strong th:text="${bmi}"></strong></p>
            <p>Tình trạng: 
                <strong th:text="${category}" 
                        th:class="${category == 'Bình thường' ? 'status-normal' : 'status-warning'}">
                </strong>
            </p>
        </div>
    </div>
</body>
</html>
