<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Form Page</title>
    <style>
        body { font-family: 'Times New Roman', Times, serif; padding: 20px; }
        .form-container { width: 400px; padding: 20px; border: 1px solid #ccc; background-color: #f9f9f9; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; }
        .form-group input, .form-group textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 15px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        a { margin-left: 10px; text-decoration: none; color: red; }
    </style>
</head>
<body>

    <h2>Nhập thông tin Page</h2>

    <div class="form-container">
        <form th:action="@{/page/save}" method="post" th:object="${page}">
            
            <div class="form-group">
                <label>ID:</label>
                <input type="text" th:field="*{id}" required placeholder="VD: P04"/>
            </div>
            
            <div class="form-group">
                <label>Page Name:</label>
                <input type="text" th:field="*{pageName}" required />
            </div>
            
            <div class="form-group">
                <label>Keyword:</label>
                <input type="text" th:field="*{keyword}" />
            </div>
            
            <div class="form-group">
                <label>Content:</label>
                <textarea th:field="*{content}" rows="4"></textarea>
            </div>
            
            <div class="form-group">
                <label>Parent Page ID:</label>
                <input type="text" th:field="*{parentPageId}" />
            </div>
            
            <button type="submit">Lưu dữ liệu</button>
            <a th:href="@{/page/all}">Hủy</a>
        </form>
    </div>

</body>
</html>
